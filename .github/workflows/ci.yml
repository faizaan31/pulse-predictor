name: CI

on:
  push:
    paths:
      - "pulsepredictor/**"
  pull_request:
    paths:
      - "pulsepredictor/**"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pulsepredictor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q
